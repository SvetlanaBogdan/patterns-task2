name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start SUT
        run: |
          java -jar ./artifacts/app-ibank.jar -P:profile=test > log.txt 2>&1 & 

      - name: Wait for SUT
        run: |
          for i in {1..10}; do
            nc -z localhost 9999 && echo "SUT started" && exit 0
            sleep 1
          done
          echo "SUT did not start"
          cat log.txt
          exit 1

      - name: Build with Gradle
        run: ./gradlew test --info -Dselenide.headless=true